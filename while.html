<!DOCTYPE html>
<html>
    <head>
        <title>while</title>
        <script>
            let contador = 1
            const qtd = prompt("quantos bimestres?")
            let soma = 0
            let nota = 0

            while(contador <=qtd){
                
                do{
                    nota = Number(prompt("digite a nota do " + contador +"º bimestre" )) 

                }while(nota > 10)
                    soma = soma + nota
                    contador++
                
            }

            const media = soma / qtd
            
            console.log("A media é: " + media)
            console.log("A soma é " + soma)

            alert(media >= 7 ? "aprovado" : "Reprovado!!")
            

            
        </script>
    </head>

    </body>
</html>
