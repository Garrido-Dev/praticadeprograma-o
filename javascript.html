<!DOCTYPE html>
<html>
    <head>
        <title>javaScript</title>
        <meta charset="UTF-8">

        <script>
            //Variaveis 
            const num1 = 10
            const num2 = 7
            const aprovado = true
            const minimo = 9
           

            //operadores
            console.log("Operadores aritiméticos")
            console.log(num1+num2)
            console.log(num1-num2)
            console.log(num1*num2)
            console.log(num1/num2)
            console.log(num1%num2)
            
            console.log("operadores relacionais")
            console.log(num1==num2)
            console.log(num1!=num2)
            console.log(num1>num2)
            console.log(num1<num2)
            console.log(num1>=num2)
            console.log(num1<=num2)

            console.log("operadores logicos")
            console.log(aprovado)
            console.log(!aprovado)
            console.log(num2 >= 7 && num2 >= minimo)
            console.log(num2 >= 7 || num2 >= minimo)

            
            

            
         
        </script>

    </head>
    <body>

    </body>

</html>
